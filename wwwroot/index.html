<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WebMonitoring — Панель Мониторинга</title>
	<style>
		body {
			background: radial-gradient(circle at top right, #1e1b4b, #0f172a 60%);
			color: #f8fafc;
			font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
			min-height: 100vh;
			margin: 0;
			padding: 2rem;
			box-sizing: border-box;
		}

		.dashboard-container {
			max-width: 1000px;
			margin: 0 auto;
		}

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 3rem;
			border-bottom: 1px solid rgba(255, 255, 255, 0.05);
			padding-bottom: 1.5rem;
		}

		h1 {
			font-size: 2.2rem;
			font-weight: 800;
			background: linear-gradient(to right, #38bdf8, #818cf8);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			margin: 0;
		}

		.refresh-status {
			font-size: 0.85rem;
			color: #64748b;
			background: rgba(255, 255, 255, 0.03);
			padding: 0.5rem 1rem;
			border-radius: 20px;
			border: 1px solid rgba(255, 255, 255, 0.05);
		}

		.add-bar {
			display: flex;
			gap: 0.75rem;
			margin-bottom: 2.5rem;
		}

			.add-bar input {
				flex: 1;
				background: rgba(30, 41, 59, 0.4);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				border: 1px solid rgba(255, 255, 255, 0.06);
				border-radius: 12px;
				padding: 0.9rem 1.1rem;
				color: #f8fafc;
				font-size: 1rem;
				outline: none;
				transition: border-color 0.2s;
			}

				.add-bar input:focus {
					border-color: rgba(129, 140, 248, 0.5);
				}

				.add-bar input::placeholder {
					color: #64748b;
				}

			.add-bar button {
				background: linear-gradient(to right, #38bdf8, #818cf8);
				color: #0f172a;
				font-weight: 700;
				border: none;
				border-radius: 12px;
				padding: 0 1.6rem;
				font-size: 0.95rem;
				cursor: pointer;
				transition: transform 0.2s, box-shadow 0.2s;
			}

				.add-bar button:hover {
					transform: translateY(-2px);
					box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
				}

		#sites-list {
			display: flex;
			flex-direction: column;
			gap: 1.25rem;
		}

		.site-card {
			background: rgba(30, 41, 59, 0.4);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid rgba(255, 255, 255, 0.06);
			border-radius: 16px;
			padding: 1.5rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
			box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
		}

			.site-card:hover {
				transform: translateY(-3px);
				border-color: rgba(129, 140, 248, 0.3);
				box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
				background: rgba(30, 41, 59, 0.55);
			}

		.site-info {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			max-width: 70%;
		}

		.site-url {
			font-size: 1.15rem;
			font-weight: 600;
			color: #ffffff;
			text-decoration: none;
			word-break: break-all;
			transition: color 0.2s;
		}

			.site-url:hover {
				color: #38bdf8;
			}

		.site-meta {
			display: flex;
			gap: 1.5rem;
			font-size: 0.85rem;
			color: #94a3b8;
		}

		.meta-item strong {
			color: #cbd5e1;
		}

		.error-text {
			color: #fca5a5;
			font-size: 0.85rem;
			margin-top: 0.5rem;
			font-family: 'Courier New', Courier, monospace;
			background: rgba(239, 68, 68, 0.08);
			padding: 0.75rem 1rem;
			border-radius: 8px;
			border-left: 4px solid #ef4444;
			word-break: break-all;
		}

		.card-right {
			display: flex;
			align-items: center;
			gap: 1rem;
		}

		.delete-btn {
			background: rgba(239, 68, 68, 0.1);
			border: 1px solid rgba(239, 68, 68, 0.2);
			color: #fca5a5;
			border-radius: 10px;
			padding: 0.55rem 0.9rem;
			font-size: 0.8rem;
			cursor: pointer;
			transition: all 0.2s;
		}

			.delete-btn:hover {
				background: rgba(239, 68, 68, 0.2);
				color: #fff;
			}

		.status-container {
			display: flex;
			align-items: center;
			gap: 1rem;
			background: rgba(0, 0, 0, 0.2);
			padding: 0.6rem 1.2rem;
			border-radius: 30px;
			border: 1px solid rgba(255, 255, 255, 0.03);
			min-width: 140px;
			justify-content: flex-start;
		}

		.bulb {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			position: relative;
			flex-shrink: 0;
		}

		.status-text {
			font-weight: 700;
			font-size: 0.85rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}

		.bulb-up {
			background-color: #10b981;
			box-shadow: 0 0 14px #10b981, 0 0 28px #10b981;
		}

			.bulb-up::after {
				content: '';
				position: absolute;
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background: #10b981;
				animation: pulse-glow 2s infinite ease-in-out;
			}

		.text-up {
			color: #10b981;
		}

		.bulb-down {
			background-color: #ef4444;
			box-shadow: 0 0 14px #ef4444, 0 0 28px #ef4444;
		}

			.bulb-down::after {
				content: '';
				position: absolute;
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background: #ef4444;
				animation: pulse-glow 1.5s infinite ease-in-out;
			}

		.text-down {
			color: #ef4444;
		}

		.bulb-unknown {
			background-color: #f59e0b;
			box-shadow: 0 0 12px #f59e0b;
		}

			.bulb-unknown::after {
				content: '';
				position: absolute;
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background: #f59e0b;
				animation: pulse-glow 2.5s infinite ease-in-out;
			}

		.text-unknown {
			color: #f59e0b;
		}

		@keyframes pulse-glow {
			0% {
				transform: scale(1);
				opacity: 0.75;
			}

			50% {
				transform: scale(2.4);
				opacity: 0;
			}

			100% {
				transform: scale(1);
				opacity: 0;
			}
		}

		.no-data {
			text-align: center;
			padding: 3rem;
			color: #64748b;
			border: 2px dashed rgba(255, 255, 255, 0.05);
			border-radius: 16px;
			font-style: italic;
		}
	</style>
</head>
<body>

	<div class="dashboard-container">
		<header>
			<h1>WebMonitoring</h1>
			<div class="refresh-status" id="timer-text">Обновление данных...</div>
		</header>

		<div class="add-bar">
			<input id="url-input" type="text" placeholder="https://example.com">
			<button id="add-btn">Добавить сайт</button>
		</div>

		<main id="sites-list">
			<div class="no-data">Загрузка конфигурации мониторинга...</div>
		</main>
	</div>

	<script>
		const API_URL = '/api/sites';

		function getStatusConfig(status) {
			const normalized = status.toString().trim().toLowerCase();
			switch (normalized) {
				case "1":
				case "up":
					return { class: "bulb-up", textClass: "text-up", text: "В сети" };
				case "2":
				case "down":
					return { class: "bulb-down", textClass: "text-down", text: "Offline" };
				case "0":
				case "unknown":
				default:
					return { class: "bulb-unknown", textClass: "text-unknown", text: "Ожидание" };
			}
		}

		async function loadSites() {
			const listContainer = document.getElementById('sites-list');
			const timerText = document.getElementById('timer-text');

			try {
				const response = await fetch(API_URL);
				if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);

				const sites = await response.json();

				if (sites.length === 0) {
					listContainer.innerHTML = '<div class="no-data">Список отслеживаемых сайтов пуст.</div>';
					return;
				}

				listContainer.innerHTML = '';

				sites.forEach(site => {
					const config = getStatusConfig(site.status);

					// Время проверки → переводим UTC в местное (минское) время
					const lastCheckedTime = site.lastChecked
						? new Date(site.lastChecked + 'Z').toLocaleTimeString('ru-RU')
						: '—';

					const responseTime = site.lastResponseTimeMs !== undefined && site.lastResponseTimeMs > 0
						? `${site.lastResponseTimeMs} мс`
						: '—';

					const errorBlock = (site.status.toString() === "2" || site.status.toString().toLowerCase() === "down") && site.errorMessage
						? `<div class="error-text">❌ ${site.errorMessage}</div>`
						: '';

					const cardHtml = `
							<div class="site-card">
								<div class="site-info">
									<a href="${site.url}" target="_blank" class="site-url">${site.url}</a>
									<div class="site-meta">
										<div class="meta-item">⏱️ Проверен: <strong>${lastCheckedTime}</strong></div>
										<div class="meta-item">⚡ Ответ: <strong>${responseTime}</strong></div>
										<div class="meta-item">🔢 Код: <strong>${site.lastStatusCode || '—'}</strong></div>
									</div>
									${errorBlock}
								</div>
								<div class="card-right">
									<div class="status-container">
										<div class="bulb ${config.class}"></div>
										<span class="status-text ${config.textClass}">${config.text}</span>
									</div>
									<button class="delete-btn" onclick="deleteSite(${site.id})">Удалить</button>
								</div>
							</div>
						`;
					listContainer.insertAdjacentHTML('beforeend', cardHtml);
				});

				// Время синхронизации тоже в местном формате
				const now = new Date();
				timerText.innerText = `Синхронизировано: ${now.toLocaleTimeString('ru-RU')}`;

			} catch (error) {
				console.error("Ошибка обновления данных:", error);
				timerText.innerText = "⚠️ Ошибка связи с бэкендом";
				listContainer.innerHTML = `
						<div class="no-data" style="color: #fca5a5; border-color: rgba(239,68,68,0.2)">
							Не удалось загрузить данные. Убедись, что бэкенд запущен.<br>
							<small style="color: #64748b; font-family: monospace; display:block; margin-top:0.5rem;">${error.message}</small>
						</div>`;
			}
		}

		async function addSite() {
			const input = document.getElementById('url-input');
			const url = input.value.trim();
			if (!url) return;
			try {
				const res = await fetch(API_URL, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ url })
				});
				if (!res.ok) throw new Error('Ошибка ' + res.status);
				input.value = '';
				loadSites();
			} catch (e) {
				console.error("Не удалось добавить сайт:", e);
			}
		}

		async function deleteSite(id) {
			try {
				await fetch(API_URL + '/' + id, { method: 'DELETE' });
				loadSites();
			} catch (e) {
				console.error("Не удалось удалить сайт:", e);
			}
		}

		document.getElementById('add-btn').addEventListener('click', addSite);
		document.getElementById('url-input').addEventListener('keydown', e => {
			if (e.key === 'Enter') addSite();
		});

		loadSites();
		setInterval(loadSites, 10000);
	</script>
</body>
</html>
